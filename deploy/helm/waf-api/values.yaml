# Default values for waf-api.
# Override per-environment in values-<env>.yaml or via --set flags.

replicaCount: 2

image:
  repository: wafagentacr.azurecr.io/waf-api
  pullPolicy: Always
  tag: ""  # Defaults to Chart.appVersion if empty.

serviceAccount:
  name: waf-api
  annotations:
    azure.workload.identity/client-id: ""  # Set per-environment.

resources:
  requests:
    cpu: "500m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

nodeSelector:
  agentpool: apipool

tolerations:
  - key: "workload"
    operator: "Equal"
    value: "api"
    effect: "NoSchedule"

podDisruptionBudget:
  enabled: true
  minAvailable: 1

# HPA replaces fixed replicaCount at runtime.
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: azure/application-gateway
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
    appgw.ingress.kubernetes.io/ssl-redirect: "true"
    appgw.ingress.kubernetes.io/backend-protocol: "http"
    appgw.ingress.kubernetes.io/request-timeout: "60"
    appgw.ingress.kubernetes.io/connection-draining: "true"
    appgw.ingress.kubernetes.io/connection-draining-timeout: "30"
  host: ""         # e.g. waf-api.example.com — set per-environment.
  tlsSecretName: waf-api-tls

env:
  APP_ENV: "production"
  LOG_LEVEL: "INFO"
  OTEL_EXPORTER_ENABLED: "true"
  OTEL_SERVICE_NAME: "waf-api"
  API_WORKERS: "4"
  # Non-secret connection details — secrets arrive via CSI mounts.
  AZURE_SERVICEBUS_NAMESPACE: ""   # e.g. "wafagent-prod.servicebus.windows.net"
  AZURE_KEYVAULT_URI: ""           # e.g. "https://wafagent-prod.vault.azure.net"
  REDIS_URL: ""                    # e.g. "redis://wafagent-redis:6380/0"
  DB_HOST: ""
  DB_PORT: "5432"
  DB_NAME: "wafagent"
  DB_USER: "wafagent_api"
  DB_POOL_MIN_SIZE: "5"
  DB_POOL_MAX_SIZE: "20"

livenessProbe:
  httpGet:
    path: /healthz
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 15
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /readyz
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 2
