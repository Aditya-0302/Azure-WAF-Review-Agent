# Default values for waf-reasoning-agent.
# Override per-environment in values-<env>.yaml or via --set flags.

replicaCount: 1  # Overridden by KEDA at runtime.

image:
  repository: wafagentacr.azurecr.io/waf-reasoning-agent
  pullPolicy: Always
  tag: ""

serviceAccount:
  name: waf-reasoning-agent
  annotations:
    azure.workload.identity/client-id: ""

# Reasoning runs the DSL evaluator (CPU) + waits on Azure OpenAI (network).
# 2Gi memory to hold full rule set + compressed resource properties in-process.
resources:
  requests:
    cpu: "500m"
    memory: "2Gi"
  limits:
    cpu: "2000m"
    memory: "4Gi"

nodeSelector:
  agentpool: agentpool

tolerations: []

podDisruptionBudget:
  enabled: true
  minAvailable: 0

env:
  APP_ENV: "production"
  LOG_LEVEL: "INFO"
  OTEL_EXPORTER_ENABLED: "true"
  OTEL_SERVICE_NAME: "waf-reasoning-agent"
  AZURE_SERVICEBUS_NAMESPACE: ""
  AZURE_KEYVAULT_URI: ""
  DB_HOST: ""
  DB_PORT: "5432"
  DB_NAME: "wafagent"
  DB_USER: "wafagent_agents"
  AZURE_OPENAI_ENDPOINT: ""        # e.g. "https://wafagent-oai.openai.azure.com"
  AZURE_OPENAI_DEPLOYMENT: "gpt-4o"
  AZURE_OPENAI_API_VERSION: "2024-08-01-preview"
  AZURE_SEARCH_ENDPOINT: ""        # e.g. "https://wafagent-search.search.windows.net"
  AZURE_SEARCH_INDEX_NAME: "waf-rules"
  REASONING_TIMEOUT_S: "300"       # 5-minute hard cap per assessment.
  LLM_MAX_TOKENS: "4096"
  LLM_TEMPERATURE: "0"

livenessProbe:
  exec:
    command: ["python", "-c", "import waf_reasoning.main"]
  initialDelaySeconds: 15
  periodSeconds: 30
  failureThreshold: 3

keda:
  enabled: true
  minReplicas: 0
  maxReplicas: 5
  triggerMessageCount: "1"
  queueName: "reasoning.requested"
  cooldownPeriod: 180
  pollingInterval: 15
