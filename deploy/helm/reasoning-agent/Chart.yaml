apiVersion: v2
name: waf-reasoning-agent
description: >
  Reasoning Agent for the AI-Powered Azure WAF Review Agent.
  Consumes reasoning.requested events, runs DSL evaluator against extracted
  resource properties, augments with GPT-4o via Azure OpenAI, retrieves
  supplemental rules from Azure AI Search, and persists findings.
