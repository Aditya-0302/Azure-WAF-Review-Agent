name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Static analysis ───────────────────────────────────────────────────────────
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install tooling
        run: |
          pip install ruff==0.8.4 mypy bandit detect-secrets
          pip install -e "src/shared[dev]"
          pip install -e "src/api[dev]"

      - name: ruff lint
        run: ruff check src/ tests/

      - name: ruff format check
        run: ruff format --check src/ tests/

      - name: mypy type check
        run: mypy src/ --config-file pyproject.toml

      - name: bandit security scan
        run: bandit -r src/ -ll -c pyproject.toml

      - name: detect-secrets
        run: detect-secrets scan --baseline .secrets.baseline

  # ── Unit + contract tests ─────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install packages
        run: |
          pip install -e "src/shared[dev]"
          pip install -e "src/api[dev]"
          pip install -e "src/agents/extraction[dev]"
          pip install -e "src/agents/preparation[dev]"
          pip install -e "src/agents/reasoning[dev]"
          pip install -e "src/agents/reporting[dev]"
          pip install pytest pytest-asyncio pytest-cov pytest-mock

      - name: Run unit tests
        run: pytest tests/unit/ tests/contract/ -v -m "unit or contract" --cov=src --cov-report=xml --cov-fail-under=80

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml

  # ── Dependency vulnerability audit ───────────────────────────────────────────
  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy — Dockerfile config scan (all images)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: pip-audit
        run: |
          pip install pip-audit
          pip install -e "src/shared"
          pip install -e "src/api"
          pip install -e "src/agents/extraction"
          pip install -e "src/agents/preparation"
          pip install -e "src/agents/reasoning"
          pip install -e "src/agents/reporting"
          pip-audit

  # ── Docker builds (all 5 images, no push) ────────────────────────────────────
  docker-build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: waf-api
            dockerfile: src/api/Dockerfile
          - name: waf-preparation-agent
            dockerfile: src/agents/preparation/Dockerfile
          - name: waf-extraction-agent
            dockerfile: src/agents/extraction/Dockerfile
          - name: waf-reasoning-agent
            dockerfile: src/agents/reasoning/Dockerfile
          - name: waf-reporting-agent
            dockerfile: src/agents/reporting/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: production
          push: false
          tags: ${{ matrix.name }}:ci

  # ── Compose config validation ─────────────────────────────────────────────────
  compose-validate:
    name: Validate docker-compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.dev.yml
        run: docker compose -f docker-compose.dev.yml config --quiet
