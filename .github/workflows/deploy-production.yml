name: Deploy to Production

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Exact image tag to deploy (required for manual deploys)"
        required: true
      skip_smoke:
        description: "Skip smoke tests (use only for emergency rollbacks)"
        required: false
        default: "false"

concurrency:
  group: deploy-production
  cancel-in-progress: false  # Production deploys must never cancel each other.

env:
  CLUSTER_NAME: wafagent-aks-prod
  RESOURCE_GROUP: rg-wafagent-prod
  NAMESPACE: wafagent-prod

jobs:
  resolve-tag:
    name: Resolve image tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - id: tag
        run: |
          if [[ -n "${{ inputs.image_tag }}" ]]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            # Strip refs/tags/ prefix to get bare semver tag.
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Helm upgrade — production
    needs: resolve-tag
    runs-on: ubuntu-latest
    # Requires manual approval via GitHub Environment protection rules.
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --name ${{ env.CLUSTER_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --overwrite-existing

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.15.0"

      # ── Rolling deploy: API first (traffic-bearing), then agents ─────────────

      - name: Deploy waf-api
        run: |
          helm upgrade waf-api deploy/helm/waf-api \
            --namespace ${{ env.NAMESPACE }} \
            --install \
            --wait --timeout 10m \
            --atomic \
            --set image.tag=${{ needs.resolve-tag.outputs.tag }} \
            --set ingress.host=${{ secrets.PROD_API_HOSTNAME }} \
            --set serviceAccount.annotations."azure\.workload\.identity/client-id"=${{ secrets.PROD_API_CLIENT_ID }} \
            --set env.AZURE_SERVICEBUS_NAMESPACE=${{ secrets.PROD_SERVICEBUS_NS }} \
            --set env.AZURE_KEYVAULT_URI=${{ secrets.PROD_KEYVAULT_URI }} \
            --set env.DB_HOST=${{ secrets.PROD_DB_HOST }} \
            --set env.REDIS_URL=${{ secrets.PROD_REDIS_URL }} \
            --set autoscaling.minReplicas=2 \
            --set autoscaling.maxReplicas=10

      - name: Deploy preparation-agent
        run: |
          helm upgrade waf-preparation deploy/helm/preparation-agent \
            --namespace ${{ env.NAMESPACE }} \
            --install --wait --timeout 5m --atomic \
            --set image.tag=${{ needs.resolve-tag.outputs.tag }} \
            --set serviceAccount.annotations."azure\.workload\.identity/client-id"=${{ secrets.PROD_AGENTS_CLIENT_ID }} \
            --set env.AZURE_SERVICEBUS_NAMESPACE=${{ secrets.PROD_SERVICEBUS_NS }} \
            --set env.AZURE_KEYVAULT_URI=${{ secrets.PROD_KEYVAULT_URI }} \
            --set env.DB_HOST=${{ secrets.PROD_DB_HOST }}

      - name: Deploy extraction-agent
        run: |
          helm upgrade waf-extraction deploy/helm/extraction-agent \
            --namespace ${{ env.NAMESPACE }} \
            --install --wait --timeout 5m --atomic \
            --set image.tag=${{ needs.resolve-tag.outputs.tag }} \
            --set serviceAccount.annotations."azure\.workload\.identity/client-id"=${{ secrets.PROD_AGENTS_CLIENT_ID }} \
            --set env.AZURE_SERVICEBUS_NAMESPACE=${{ secrets.PROD_SERVICEBUS_NS }} \
            --set env.AZURE_KEYVAULT_URI=${{ secrets.PROD_KEYVAULT_URI }} \
            --set env.DB_HOST=${{ secrets.PROD_DB_HOST }}

      - name: Deploy reasoning-agent
        run: |
          helm upgrade waf-reasoning deploy/helm/reasoning-agent \
            --namespace ${{ env.NAMESPACE }} \
            --install --wait --timeout 5m --atomic \
            --set image.tag=${{ needs.resolve-tag.outputs.tag }} \
            --set serviceAccount.annotations."azure\.workload\.identity/client-id"=${{ secrets.PROD_AGENTS_CLIENT_ID }} \
            --set env.AZURE_SERVICEBUS_NAMESPACE=${{ secrets.PROD_SERVICEBUS_NS }} \
            --set env.AZURE_KEYVAULT_URI=${{ secrets.PROD_KEYVAULT_URI }} \
            --set env.DB_HOST=${{ secrets.PROD_DB_HOST }} \
            --set env.AZURE_OPENAI_ENDPOINT=${{ secrets.PROD_OPENAI_ENDPOINT }} \
            --set env.AZURE_SEARCH_ENDPOINT=${{ secrets.PROD_SEARCH_ENDPOINT }}

      - name: Deploy reporting-agent
        run: |
          helm upgrade waf-reporting deploy/helm/reporting-agent \
            --namespace ${{ env.NAMESPACE }} \
            --install --wait --timeout 5m --atomic \
            --set image.tag=${{ needs.resolve-tag.outputs.tag }} \
            --set serviceAccount.annotations."azure\.workload\.identity/client-id"=${{ secrets.PROD_REPORTING_CLIENT_ID }} \
            --set env.REPORTING_SERVICE_BUS_NAMESPACE=${{ secrets.PROD_SERVICEBUS_NS }} \
            --set env.REPORTING_KEYVAULT_URI=${{ secrets.PROD_KEYVAULT_URI }} \
            --set env.REPORTING_STORAGE_ACCOUNT_URL=${{ secrets.PROD_STORAGE_URL }}

  smoke:
    name: Production smoke tests
    needs: [resolve-tag, deploy]
    if: inputs.skip_smoke != 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test deps
        run: pip install pytest pytest-asyncio httpx

      - name: Run smoke tests
        env:
          E2E_API_BASE_URL: https://${{ secrets.PROD_API_HOSTNAME }}
          E2E_BEARER_TOKEN: ${{ secrets.PROD_E2E_TOKEN }}
          E2E_TENANT_ID: ${{ secrets.PROD_E2E_TENANT_ID }}
          E2E_SUBSCRIPTION_ID: ${{ secrets.PROD_E2E_SUBSCRIPTION_ID }}
          E2E_POLL_TIMEOUT_S: "300"
        run: pytest tests/e2e/ -v -m "e2e and smoke" --tb=short

  notify-success:
    name: Notify production deploy success
    needs: [resolve-tag, deploy, smoke]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: aliencube/microsoft-teams-actions@v0.8.0
        with:
          webhook_uri: ${{ secrets.TEAMS_WEBHOOK_URI }}
          title: "Production deploy succeeded"
          summary: "Tag ${{ needs.resolve-tag.outputs.tag }} deployed to production"
          theme_color: "00FF00"

  notify-failure:
    name: Notify production deploy failure
    needs: [resolve-tag, deploy, smoke]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: aliencube/microsoft-teams-actions@v0.8.0
        with:
          webhook_uri: ${{ secrets.TEAMS_WEBHOOK_URI }}
          title: "PRODUCTION DEPLOY FAILED"
          summary: "Tag ${{ needs.resolve-tag.outputs.tag }} failed — check rollback runbook"
          theme_color: "FF0000"
