name: Deploy to Staging

on:
  workflow_run:
    workflows: ["Build & Push Images"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (defaults to latest build on main)"
        required: false

concurrency:
  group: deploy-staging
  cancel-in-progress: false  # Never cancel an in-flight staging deploy.

env:
  CLUSTER_NAME: wafagent-aks-staging
  RESOURCE_GROUP: rg-wafagent-staging
  NAMESPACE: wafagent-staging

jobs:
  guard:
    name: Guard — check upstream build succeeded
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - run: echo "Upstream build succeeded or manual trigger — proceeding."

  resolve-tag:
    name: Resolve image tag
    needs: guard
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - id: tag
        run: |
          if [[ -n "${{ inputs.image_tag }}" ]]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            # Use the commit SHA that triggered the upstream workflow run.
            echo "tag=${{ github.event.workflow_run.head_sha || github.sha }}" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Helm upgrade — staging
    needs: resolve-tag
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --name ${{ env.CLUSTER_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --overwrite-existing

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.15.0"

      - name: Deploy waf-api
        run: |
          helm upgrade waf-api deploy/helm/waf-api \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --install \
            --wait --timeout 5m \
            --set image.tag=${{ needs.resolve-tag.outputs.tag }} \
            --set ingress.host=${{ secrets.STAGING_API_HOSTNAME }} \
            --set serviceAccount.annotations."azure\.workload\.identity/client-id"=${{ secrets.STAGING_API_CLIENT_ID }} \
            --set env.AZURE_SERVICEBUS_NAMESPACE=${{ secrets.STAGING_SERVICEBUS_NS }} \
            --set env.AZURE_KEYVAULT_URI=${{ secrets.STAGING_KEYVAULT_URI }} \
            --set env.DB_HOST=${{ secrets.STAGING_DB_HOST }} \
            --set env.REDIS_URL=${{ secrets.STAGING_REDIS_URL }} \
            --set autoscaling.minReplicas=1 \
            --set autoscaling.maxReplicas=3

      - name: Deploy preparation-agent
        run: |
          helm upgrade waf-preparation deploy/helm/preparation-agent \
            --namespace ${{ env.NAMESPACE }} \
            --install --wait --timeout 3m \
            --set image.tag=${{ needs.resolve-tag.outputs.tag }} \
            --set serviceAccount.annotations."azure\.workload\.identity/client-id"=${{ secrets.STAGING_AGENTS_CLIENT_ID }} \
            --set env.AZURE_SERVICEBUS_NAMESPACE=${{ secrets.STAGING_SERVICEBUS_NS }} \
            --set env.AZURE_KEYVAULT_URI=${{ secrets.STAGING_KEYVAULT_URI }} \
            --set env.DB_HOST=${{ secrets.STAGING_DB_HOST }}

      - name: Deploy extraction-agent
        run: |
          helm upgrade waf-extraction deploy/helm/extraction-agent \
            --namespace ${{ env.NAMESPACE }} \
            --install --wait --timeout 3m \
            --set image.tag=${{ needs.resolve-tag.outputs.tag }} \
            --set serviceAccount.annotations."azure\.workload\.identity/client-id"=${{ secrets.STAGING_AGENTS_CLIENT_ID }} \
            --set env.AZURE_SERVICEBUS_NAMESPACE=${{ secrets.STAGING_SERVICEBUS_NS }} \
            --set env.AZURE_KEYVAULT_URI=${{ secrets.STAGING_KEYVAULT_URI }} \
            --set env.DB_HOST=${{ secrets.STAGING_DB_HOST }}

      - name: Deploy reasoning-agent
        run: |
          helm upgrade waf-reasoning deploy/helm/reasoning-agent \
            --namespace ${{ env.NAMESPACE }} \
            --install --wait --timeout 3m \
            --set image.tag=${{ needs.resolve-tag.outputs.tag }} \
            --set serviceAccount.annotations."azure\.workload\.identity/client-id"=${{ secrets.STAGING_AGENTS_CLIENT_ID }} \
            --set env.AZURE_SERVICEBUS_NAMESPACE=${{ secrets.STAGING_SERVICEBUS_NS }} \
            --set env.AZURE_KEYVAULT_URI=${{ secrets.STAGING_KEYVAULT_URI }} \
            --set env.DB_HOST=${{ secrets.STAGING_DB_HOST }} \
            --set env.AZURE_OPENAI_ENDPOINT=${{ secrets.STAGING_OPENAI_ENDPOINT }} \
            --set env.AZURE_SEARCH_ENDPOINT=${{ secrets.STAGING_SEARCH_ENDPOINT }}

      - name: Deploy reporting-agent
        run: |
          helm upgrade waf-reporting deploy/helm/reporting-agent \
            --namespace ${{ env.NAMESPACE }} \
            --install --wait --timeout 3m \
            --set image.tag=${{ needs.resolve-tag.outputs.tag }} \
            --set serviceAccount.annotations."azure\.workload\.identity/client-id"=${{ secrets.STAGING_REPORTING_CLIENT_ID }} \
            --set env.REPORTING_SERVICE_BUS_NAMESPACE=${{ secrets.STAGING_SERVICEBUS_NS }} \
            --set env.REPORTING_KEYVAULT_URI=${{ secrets.STAGING_KEYVAULT_URI }} \
            --set env.REPORTING_STORAGE_ACCOUNT_URL=${{ secrets.STAGING_STORAGE_URL }}

  # ── Smoke tests against staging ───────────────────────────────────────────────
  smoke:
    name: Smoke tests
    needs: [resolve-tag, deploy]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test deps
        run: |
          pip install -e "src/shared[dev]"
          pip install pytest pytest-asyncio httpx

      - name: Run smoke tests
        env:
          E2E_API_BASE_URL: https://${{ secrets.STAGING_API_HOSTNAME }}
          E2E_BEARER_TOKEN: ${{ secrets.STAGING_E2E_TOKEN }}
          E2E_TENANT_ID: ${{ secrets.STAGING_E2E_TENANT_ID }}
          E2E_SUBSCRIPTION_ID: ${{ secrets.STAGING_E2E_SUBSCRIPTION_ID }}
          E2E_POLL_TIMEOUT_S: "120"
        run: pytest tests/e2e/ -v -m "e2e and smoke" --tb=short

  notify-failure:
    name: Notify on failure
    needs: [deploy, smoke]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Post to Teams channel
        uses: aliencube/microsoft-teams-actions@v0.8.0
        with:
          webhook_uri: ${{ secrets.TEAMS_WEBHOOK_URI }}
          title: "Staging deploy failed"
          summary: "Deploy to staging failed for commit ${{ github.sha }}"
          theme_color: "FF0000"
