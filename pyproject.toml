[tool.ruff]
target-version = "py312"
line-length = 100
quote-style = "double"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "S", "ANN", "B", "UP"]
ignore = [
    "ANN101",  # missing type annotation for self
    "ANN102",  # missing type annotation for cls
    "S101",    # use of assert — allowed in tests
]
per-file-ignores = { "tests/**" = ["S", "ANN"] }

[tool.ruff.lint.isort]
known-first-party = ["waf_shared", "waf_api"]

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]
ignore_missing_imports = false
disallow_any_generics = true
disallow_untyped_defs = true
warn_return_any = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false
warn_return_any = false

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "unit: fast, no I/O",
    "integration: requires Docker Compose services",
    "contract: Pact consumer/provider tests",
    "e2e: staging environment required",
    "smoke: subset of e2e, runs in CI post-deploy",
    "slow: long-running (live Azure subscription)",
]
filterwarnings = ["error", "ignore::DeprecationWarning"]

[tool.coverage.run]
source = ["src"]
omit = ["*/migrations/*", "*/__init__.py"]
branch = true

[tool.coverage.report]
fail_under = 80
show_missing = true
