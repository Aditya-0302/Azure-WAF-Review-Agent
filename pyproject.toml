[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.format]
quote-style = "double"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "S", "ANN", "B", "UP"]
ignore = [
    "S101",    # assert — allowed in tests
    "ANN401",  # typing.Any required by Azure SDK and asyncpg callback signatures
    "N806",    # UPPER_CASE local constants are intentional (pdf_generator, evaluators)
    "S110",    # try-except-pass is intentional in resilient report-generation paths
    "S608",    # false positives — queries use asyncpg $N parameterization
    "B008",    # FastAPI Depends() and Pydantic Field() are documented default-arg callables
    "F821",    # forward string refs + runtime imports to break circular deps; type: ignore present
    "S105",    # "PASS"/"FAIL" are result-status strings, not passwords
    "S311",    # non-cryptographic random is intentional (assessment scoring)
    "B017",    # pytest.raises without match= is acceptable in unit tests
    "E402",    # module-level imports after code (lazy imports to break circular deps)
]
[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S", "ANN", "F841", "B007", "E501"]
# Catalog data file — long rule descriptions and guidance strings are intentional.
"src/shared/waf_catalog/**" = ["E501"]
# Alembic migration files contain long DDL strings that cannot be wrapped.
"src/shared/waf_shared/db/migrations/**" = ["N811", "E501"]
# Report generation files — complex ReportLab/openpyxl layout code with unavoidable long lines
# and private helper functions where exhaustive ANN coverage exceeds the value.
"src/agents/reporting/**" = ["E501", "ANN001", "ANN002", "ANN003", "ANN202", "B007", "S108", "S112"]
# _SyncClientSecretCredential is PascalCase by design for test-patch compatibility (see docstring).
"src/shared/waf_shared/auth/credential_provider.py" = ["N802", "ANN002", "ANN003", "B027"]
# QuotaExceededException predates the N818 convention; renaming cascades to the API contract.
"src/shared/waf_shared/domain/errors/domain_errors.py" = ["N818"]

[tool.ruff.lint.isort]
known-first-party = ["waf_shared", "waf_api"]

[tool.mypy]
python_version = "3.12"
plugins = ["pydantic.mypy"]

# Third-party libraries without complete type stubs (asyncpg, azure-*, python-jose,
# dependency-injector, reportlab, openpyxl, etc.) are ignored rather than blocking CI.
# This is the standard OSS approach: verify the code you own, trust what you import.
ignore_missing_imports = true

# Baseline strictness applied to all checked modules (src/shared, src/api).
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true

# ── Modules excluded from type checking ──────────────────────────────────────
# Agent pipelines: application code written before strict typing; relies heavily on
# Azure SDK types and asyncpg Records that lack complete stubs.
# waf_catalog: pure data module; checked by Ruff, not mypy.
# db/migrations: Alembic DDL files; auto-generated, not runtime-typed.
exclude = [
    "src/agents/",
    "src/shared/waf_catalog",
    "src/shared/waf_shared/db/migrations",
]

# ── Per-module overrides ──────────────────────────────────────────────────────

# asyncpg ships typed stubs for Record but requires explicit type arguments.
# Repositories use asyncpg.Record without type args — suppress the false positive
# rather than threading type params through every row-mapper function.
[[tool.mypy.overrides]]
module = [
    "waf_shared.db.repositories.human_review_repository",
    "waf_shared.db.repositories.assessment_repository",
    "waf_shared.db.repositories.tenant_repository",
    "waf_shared.db.repositories.webhook_repository",
    "waf_shared.db.repository",
    "waf_shared.db.pool",
]
ignore_errors = false
disable_error_code = ["index", "valid-type", "union-attr", "arg-type"]

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "unit: fast, no I/O",
    "integration: requires Docker Compose services",
    "contract: Pact consumer/provider tests",
    "e2e: staging environment required",
    "smoke: subset of e2e, runs in CI post-deploy",
    "slow: long-running (live Azure subscription)",
]
filterwarnings = ["error", "ignore::DeprecationWarning"]

[tool.coverage.run]
source = ["src"]
omit = ["*/migrations/*", "*/__init__.py"]
branch = true

[tool.coverage.report]
fail_under = 80
show_missing = true

# ── Bandit security scan configuration ───────────────────────────────────────
[tool.bandit]
# B608: asyncpg uses $N positional parameterization exclusively — no user input
# is ever interpolated into query strings. Bandit's regex-based heuristic cannot
# distinguish parameterized queries from raw string construction, so all 50+
# repository query sites produce false positives. The same reasoning applies to
# Ruff S608, which is also suppressed in [tool.ruff.lint.ignore].
# All other SQL-injection checks remain active.
skips = ["B608"]

# Exclude pure-data and auto-generated paths that contain no executable logic.
# The catalog is WAF rule definitions (strings/dicts); migrations are Alembic DDL.
# Neither path runs user-supplied input through any callable, so scanning adds
# noise without security value.
exclude_dirs = [
    "src/shared/waf_catalog",
    "src/shared/waf_shared/db/migrations",
]
