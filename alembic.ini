[alembic]
script_location = src/shared/waf_shared/db/migrations
prepend_sys_path = .
version_path_separator = os
# Intentionally blank. env.py builds the URL from environment variables
# (loaded from .env for local dev, injected by K8s for production).
# See: src/shared/waf_shared/db/migrations/env.py::_get_url()
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
